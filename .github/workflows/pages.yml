name: Deploy Shopping app to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create sync config
        run: |
          cat > live/config.js <<'EOF'
          window.SHOPPING_SYNC = {
            url: 'https://agfmsmdwhvbxqgkoxawa.supabase.co',
            appKey: 'jason_rach_shop_live_v1',
            anonKey: '${{ secrets.SHOPPING_SUPABASE_ANON_KEY }}'
          };
          EOF
          base64 -d live/period-save-fix.b64 > live/period-save-fix.js
          python - <<'PY'
          from pathlib import Path
          p = Path('live/index.html')
          s = p.read_text()
          tags = '<script src="config.js?v=7"></script><script src="sync.js?v=7"></script><script src="periods-fix.js?v=7"></script><script src="ingredients-fix.js?v=7"></script><script src="meal-swap.js?v=7"></script><script src="period-save-fix.js?v=7"></script>'
          for old in [
              '<script src="config.js"></script><script src="sync.js"></script><script src="periods-fix.js"></script>',
              '<script src="config.js"></script><script src="sync.js"></script>',
              '<script src="config.js?v=2"></script><script src="sync.js?v=2"></script><script src="periods-fix.js?v=2"></script>',
              '<script src="config.js?v=3"></script><script src="sync.js?v=3"></script><script src="periods-fix.js?v=3"></script>',
              '<script src="config.js?v=4"></script><script src="sync.js?v=4"></script><script src="periods-fix.js?v=4"></script>',
              '<script src="config.js?v=5"></script><script src="sync.js?v=5"></script><script src="periods-fix.js?v=5"></script><script src="ingredients-fix.js?v=5"></script>',
              '<script src="config.js?v=6"></script><script src="sync.js?v=6"></script><script src="periods-fix.js?v=6"></script><script src="ingredients-fix.js?v=6"></script><script src="meal-swap.js?v=6"></script>'
          ]:
              s = s.replace(old, '')
          s = s.replace('</body></html>', tags + '</body></html>')
          p.write_text(s)
          PY

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
