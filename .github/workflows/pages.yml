name: Deploy Shopping app to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create sync config and inject scripts
        run: |
          cat > live/config.js <<'EOF'
          window.SHOPPING_SYNC = {
            url: 'https://agfmsmdwhvbxqgkoxawa.supabase.co',
            appKey: 'jason_rach_shop_live_v1',
            anonKey: '${{ secrets.SHOPPING_SUPABASE_ANON_KEY }}'
          };
          EOF
          python - <<'PY'
          from pathlib import Path
          import re
          p = Path('live/index.html')
          s = p.read_text()
          s = re.sub(r'<script src="(?:config|sync|periods-fix|ingredients-fix|meal-swap|period-save-fix|sync-status-fix)\.js(?:\?v=\d+)?"></script>', '', s)
          tags = ''.join([
            '<script src="config.js?v=12"></script>',
            '<script src="sync.js?v=12"></script>',
            '<script src="periods-fix.js?v=12"></script>',
            '<script src="ingredients-fix.js?v=12"></script>',
            '<script src="meal-swap.js?v=12"></script>',
            '<script src="sync-status-fix.js?v=12"></script>',
          ])
          s = s.replace('</body></html>', tags + '</body></html>')
          p.write_text(s)
          PY

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
