<!doctype html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Shopping Live</title>
<style>
:root{--bg:#f7f3ec;--card:#fffaf2;--ink:#1e1b16;--muted:#756c5e;--line:#e4d8c8;--green:#2f6f5e;--red:#b84b4b;--yellow:#fff3dc}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--ink);font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial}.app{max-width:560px;margin:auto;padding:18px 14px 88px}.title{font-size:42px;line-height:.95;font-weight:950;margin:8px 0}.muted{color:var(--muted)}.hero{background:linear-gradient(135deg,#2f6f5e,#519681);color:white;border-radius:24px;padding:16px;margin:16px 0}.card{background:var(--card);border:1px solid var(--line);border-radius:22px;padding:14px;margin:12px 0;box-shadow:0 8px 22px #0001}.row,.between{display:flex;gap:8px;align-items:center}.between{justify-content:space-between}.btn{border:0;border-radius:14px;padding:10px 12px;font-weight:900;background:var(--green);color:white}.btn.alt{background:white;color:var(--ink);border:1px solid var(--line)}.btn.red{background:var(--red)}.btn.small{font-size:12px;padding:7px 9px}.tiles{display:grid;grid-template-columns:1fr 1fr;gap:12px}.tile{background:white;border:0;border-radius:20px;padding:15px;text-align:left;min-height:96px;box-shadow:0 4px 14px #0001;color:var(--ink)}.tile.primary{background:var(--green);color:white}.tile.warn{background:var(--yellow)}.tile b{font-size:18px;display:block;margin-bottom:6px}.tile span{font-size:13px;color:var(--muted)}.tile.primary span{color:#e6fff7}.week{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-top:10px}.day{background:white;border:1px solid var(--line);border-radius:12px;padding:7px 4px;min-height:86px;text-align:center;overflow:hidden}.day.agreed{background:#f1fbf3;border-color:#79b88b}.day.suggested{background:#fff8e6;border-color:#e8bf55}.day.rejected{background:#fff1f1;border-color:#d98282}.day b{font-size:11px}.meal{font-size:10px;line-height:1.05;font-weight:950;margin:5px 0}.pill{display:inline-block;border-radius:999px;padding:3px 6px;font-size:9px;font-weight:950;background:#efe5d7}.screen{display:none}.screen.on{display:block}.nav{position:fixed;left:0;right:0;bottom:0;background:#f7f3ecf2;border-top:1px solid var(--line);padding:10px 10px 18px}.nav div{max-width:560px;margin:auto;display:grid;grid-template-columns:repeat(4,1fr);gap:8px}.nav button{border:0;background:white;border-radius:16px;padding:10px 3px;font-size:12px;font-weight:900}.nav .on{background:var(--green);color:white}.item{display:flex;justify-content:space-between;gap:10px;border-bottom:1px solid var(--line);padding:11px 0}.done b{text-decoration:line-through;color:var(--muted)}input,select{width:100%;border:1px solid var(--line);border-radius:14px;background:white;padding:11px;font:inherit}.modal{position:fixed;inset:0;background:#0005;display:none;align-items:flex-end;padding:14px;z-index:20}.modal.on{display:flex}.sheet{background:var(--bg);border-radius:26px 26px 14px 14px;width:100%;max-width:560px;margin:auto;padding:14px;max-height:88vh;overflow:auto}.two{display:grid;grid-template-columns:1fr 1fr;gap:8px}.sectionTitle{font-size:20px;font-weight:950;margin:18px 0 8px}.check{width:30px;height:30px;border:2px solid var(--green);border-radius:10px;display:grid;place-items:center;font-weight:900}.done .check{background:var(--green);color:white}.hint{font-size:12px;color:var(--muted);margin-top:6px}
</style>
</head>
<body>
<div class="app">
<section id="home" class="screen on"><div class="title">Our Shop</div><div class="muted">Shared meal planner and shopping list.</div><div class="hero"><div class="between"><button class="btn alt small" onclick="move(-1)">← Prior</button><b id="periodTitle">This shop</b><button class="btn alt small" onclick="move(1)">Next →</button></div><div style="text-align:center;margin-top:8px"><span id="who" class="pill" style="background:#ffffff3d;color:white"></span><div class="hint" style="color:#e6fff7">Saved on this phone. Sync can be added later.</div></div></div><div class="card"><div class="between"><div><b>What we’re having</b><div id="periodSub" class="muted"></div></div><button class="btn small" onclick="go('finalise')">Finalise</button></div><div id="days"></div></div><div class="tiles"><button class="tile primary" onclick="go('shop')"><b>Go shopping</b><span>Tick-off and edit quantities.</span></button><button class="tile" onclick="go('plan')"><b>Plan meals</b><span>Pick meals for days.</span></button><button class="tile warn" onclick="go('finalise')"><b>Finalise meals</b><span>Include staples then build list.</span></button><button class="tile" onclick="go('setup')"><b>Setup</b><span>Meals and ingredients.</span></button></div></section>
<section id="plan" class="screen"><div class="title">Meals by day</div><div id="planDays"></div></section>
<section id="finalise" class="screen"><div class="title">Build list</div><div class="card"><b>Agreed meals</b><div id="agreed"></div></div><div class="card"><b>Staples to include</b><div id="staples"></div></div><div class="card"><button class="btn" style="width:100%" onclick="createList()">Create shopping list</button></div></section>
<section id="shop" class="screen"><div class="title">Tesco list</div><div class="muted" id="shopSummary"></div><div class="card row"><input id="manual" placeholder="Add item"><button class="btn" onclick="addManual()">Add</button></div><div id="list"></div></section>
<section id="setup" class="screen"><div class="title">Setup</div><div class="card"><b>Profile</b><p id="profile" class="muted"></p><button class="btn alt small" onclick="setUser('Jason')">Jason</button> <button class="btn alt small" onclick="setUser('Rach')">Rach</button></div><div class="card"><div class="between"><b>Meals</b><button class="btn small" onclick="addMeal()">Add meal</button></div><div id="meals"></div></div></section>
</div>
<div class="modal" id="pick"><div class="sheet"><div class="between"><h2 id="pickTitle"></h2><button class="btn alt small" onclick="closeM('pick')">Close</button></div><div id="pickMeals"></div></div></div>
<div class="modal" id="meal"><div class="sheet"><div class="between"><h2 id="mealTitle"></h2><button class="btn alt small" onclick="closeM('meal')">Close</button></div><div id="mealBody"></div></div></div>
<div class="modal" id="ing"><div class="sheet"><div class="between"><h2 id="ingTitle">Item</h2><button class="btn alt small" onclick="closeM('ing')">Close</button></div><div class="card"><div class="muted">Description</div><input id="inName"><div class="two"><div><div class="muted">Quantity</div><input id="inQty"></div><div><div class="muted">Unit</div><select id="inUnit"><option value="">none</option><option>g</option><option>kg</option><option>ml</option><option>l</option><option>pack</option><option>tin</option><option>tub</option><option>each</option><option>tbsp</option><option>tsp</option><option>cloves</option><option>loaf</option><option>pints</option></select></div></div><div class="muted">Type</div><select id="inType"><option>required</option><option>staple</option><option>optional</option></select><button class="btn" style="width:100%;margin-top:10px" onclick="saveIng()">Save</button></div></div>
<div class="nav"><div><button id="n-home" class="on" onclick="go('home')">Home</button><button id="n-plan" onclick="go('plan')">Plan</button><button id="n-shop" onclick="go('shop')">Shop</button><button id="n-setup" onclick="go('setup')">Setup</button></div></div>
<script>
let S,pi=0,dayIx=0,mealName='',editIx=null,shopIx=null;const sections=['Bathroom','Fruit and veg','Chilled','Cupboard','Bread','Beer and wine','Fizzy drinks','Squash','Sweets','Household','Frozen'];
function $(i){return document.getElementById(i)}function norm(s){return String(s||'').toLowerCase().replace(/[^a-z0-9]/g,'')}function cap(s){return String(s||'').replace(/\b\w/g,c=>c.toUpperCase())}function me(){let h=(location.hash||'').replace('#','')||localStorage.getItem('shop-user')||'jason';return h.toLowerCase().startsWith('rach')?'Rach':'Jason'}function sec(n){let k=norm(n);if(['pepper','peppers','onion','garlic','potatoes','apples','banana','bananas'].includes(k))return'Fruit and veg';if(['chicken','mince','prawns','milk','cheese','cream','eggs','butter'].includes(k))return'Chilled';if(['bread','wraps','garlicbread'].includes(k))return'Bread';if(['peas','icecream'].includes(k))return'Frozen';return'Cupboard'}function ing(n,q='',u='',t='required'){return{name:n,qty:q,unit:u,type:t,section:sec(n)}}function qt(x){return `${x.qty||''}${x.unit?' '+x.unit:''}`.trim()}function fresh(){let days=['Mon','Tue','Wed','Thu','Fri','Sat','Sun'].map(day=>({day,meal:null,status:null}));return{user:me(),periods:[{label:'This shop',days}],currentPeriod:0,meals:[{name:'Chicken fajitas',ingredients:[ing('chicken','500','g'),ing('wraps','1','pack'),ing('peppers','3','each'),ing('fajita spice mix','1','pack'),ing('oil','1','tbsp','staple')]},{name:'Spag bol',ingredients:[ing('mince','500','g'),ing('spaghetti','300','g'),ing('chopped tomatoes','2','tin'),ing('garlic','2','cloves','staple')]},{name:'Prawn pasta',ingredients:[ing('prawns','300','g'),ing('tagliatelle','300','g'),ing('cream','1','tub'),ing('garlic bread','1','each')]},{name:'Jacket potatoes',ingredients:[ing('potatoes','4','each'),ing('cheese','200','g'),ing('beans','2','tin')]}],weekly:[{name:'milk',qty:'4',unit:'pints',section:'Chilled',source:'Weekly'},{name:'bread',qty:'1',unit:'loaf',section:'Bread',source:'Weekly'}],items:[],staples:{}}}function load(){try{S=JSON.parse(localStorage.getItem('shopping-live')||'null')}catch(e){}if(!S)S=fresh();S.user=me();S.periods=S.periods&&S.periods.length?S.periods:fresh().periods;S.meals=S.meals&&S.meals.length?S.meals:fresh().meals;S.items=S.items||[];S.staples=S.staples||{};S.weekly=S.weekly||[];pi=Math.min(S.currentPeriod||0,S.periods.length-1);render();save()}function save(){S.currentPeriod=pi;localStorage.setItem('shopping-live',JSON.stringify(S))}function p(){return S.periods[pi]}function meal(n){return S.meals.find(m=>m.name===n)}function go(id){document.querySelectorAll('.screen').forEach(x=>x.classList.remove('on'));$(id).classList.add('on');document.querySelectorAll('.nav button').forEach(x=>x.classList.remove('on'));$('n-'+id).classList.add('on');render()}function closeM(id){$(id).classList.remove('on')}function move(d){let n=pi+d;if(n>=0&&n<S.periods.length){pi=n;save();render()}}function render(){S.user=me();$('who').textContent='Using as '+S.user;$('profile').textContent='Using as '+S.user;$('periodTitle').textContent=p().label||'This shop';$('periodSub').textContent=(p().days||[]).filter(d=>d.meal).length+' planned · '+(p().days||[]).length+' days';$('days').innerHTML='<div class="week">'+p().days.map((d,i)=>`<div class="day ${d.status||''}" onclick="openDay(${i})"><b>${d.day}</b><div class="meal">${d.meal||'No meal'}</div>${d.meal?`<span class="pill">${d.status||''}</span>`:''}</div>`).join('')+'</div>';renderPlan();renderFinal();renderShop();renderSetup()}function renderPlan(){$('planDays').innerHTML=p().days.map((d,i)=>`<div class="card"><div class="between"><div><b>${d.day}: ${d.meal||'No meal'}</b><div class="muted">${d.status||'choose a meal'}</div></div><div><button class="btn small" onclick="openDay(${i})">Pick</button>${d.meal&&d.status==='suggested'?` <button class="btn small" onclick="respond(${i},'agreed')">Agree</button> <button class="btn small red" onclick="respond(${i},'rejected')">Reject</button>`:''}</div></div></div>`).join('')}function openDay(i){dayIx=i;$('pickTitle').textContent=p().days[i].day;$('pickMeals').innerHTML=S.meals.map(m=>`<div class="card between"><div><b>${m.name}</b><div class="muted">${m.ingredients.length} ingredients</div></div><button class="btn small" onclick="pick('${m.name.replaceAll("'","\\'")}')">Use</button></div>`).join('');$('pick').classList.add('on')}function pick(n){let d=p().days[dayIx];d.meal=n;d.status='suggested';d.suggestedBy=S.user;closeM('pick');save();render()}function respond(i,s){p().days[i].status=s;p().days[i].respondedBy=S.user;save();render()}function setUser(u){S.user=u;localStorage.setItem('shop-user',u);save();render()}function renderSetup(){$('meals').innerHTML=S.meals.map(m=>`<div class="item"><div><b>${m.name}</b><div class="muted">${m.ingredients.length} ingredients</div></div><button class="btn small alt" onclick="editMeal('${m.name.replaceAll("'","\\'")}')">Edit</button></div>`).join('')}function editMeal(n){mealName=n;let m=meal(n);$('mealTitle').textContent=n;$('mealBody').innerHTML=`<div class="card"><div class="muted">Meal name</div><input id="mealN" value="${m.name}"><button class="btn alt" style="width:100%;margin-top:8px" onclick="saveMealName()">Save meal name</button></div><div class="card"><div class="between"><b>Ingredients</b><button class="btn small" onclick="openIng(null)">Add</button></div>${m.ingredients.map((x,i)=>`<div class="item"><div><b>${qt(x)} ${cap(x.name)}</b><div class="muted">${x.type} · ${x.section}</div></div><div><button class="btn small alt" onclick="openIng(${i})">Edit</button> <button class="btn small red" onclick="delIng(${i})">Remove</button></div></div>`).join('')}</div>`;$('meal').classList.add('on')}function saveMealName(){let m=meal(mealName),nn=$('mealN').value.trim();if(nn&&nn!==m.name){S.periods.forEach(pp=>pp.days.forEach(d=>{if(d.meal===m.name)d.meal=nn}));m.name=nn;mealName=nn}save();render();editMeal(mealName)}function addMeal(){let n=prompt('Meal name');if(n){S.meals.push({name:n,ingredients:[]});save();render();editMeal(n)}}function openIng(i){shopIx=null;editIx=i;let x=i==null?{}:meal(mealName).ingredients[i];$('ingTitle').textContent=i==null?'Add ingredient':'Edit ingredient';$('inName').value=x.name||'';$('inQty').value=x.qty||'';$('inUnit').value=x.unit||'';$('inType').value=x.type||'required';$('ing').classList.add('on')}function saveIng(){let x={name:$('inName').value.trim(),qty:$('inQty').value.trim(),unit:$('inUnit').value,type:$('inType').value,section:sec($('inName').value)};if(!x.name)return;if(shopIx!==null){S.items[shopIx]={...S.items[shopIx],...x};shopIx=null;closeM('ing');save();renderShop();return}let m=meal(mealName);if(editIx==null)m.ingredients.push(x);else m.ingredients[editIx]=x;closeM('ing');save();render();editMeal(mealName)}function delIng(i){if(confirm('Remove ingredient?')){meal(mealName).ingredients.splice(i,1);save();render();editMeal(mealName)}}function agreed(){return p().days.map(d=>({d,m:meal(d.meal)})).filter(x=>x.m&&x.d.status==='agreed')}function combine(type){let map={};agreed().forEach(({m})=>m.ingredients.filter(i=>i.type===type).forEach(i=>{let k=norm(i.name)+'|'+(i.unit||'');if(!map[k])map[k]={...i,source:[m.name]};else{if(!isNaN(+map[k].qty)&&!isNaN(+i.qty))map[k].qty=String(Math.round((+map[k].qty+ +i.qty)*100)/100);map[k].source.push(m.name)}}));return Object.values(map)}function renderFinal(){$('agreed').innerHTML=agreed().map(x=>`<div class="item"><b>${x.d.day}: ${x.m.name}</b><span class="muted">${x.d.status}</span></div>`).join('')||'<p class="muted">No agreed meals yet.</p>';$('staples').innerHTML=combine('staple').map(s=>{let k=norm(s.name)+'|'+(s.unit||'');return`<div class="item"><div><b>${qt(s)} ${cap(s.name)}</b><div class="muted">${s.source.join(', ')}</div></div><button class="btn small ${S.staples[k]?'':'alt'}" onclick="S.staples['${k}']=!S.staples['${k}'];save();render()">${S.staples[k]?'Included':'Include'}</button></div>`}).join('')||'<p class="muted">No staples.</p>'}function createList(){let items=combine('required');combine('staple').forEach(s=>{let k=norm(s.name)+'|'+(s.unit||'');if(S.staples[k])items.push(s)});S.weekly.forEach(w=>items.push({...w,section:w.section||sec(w.name),source:['Weekly']}));S.items=items.map(x=>({...x,status:'needed',source:Array.isArray(x.source)?x.source.join(', '):x.source}));save();go('shop')}function renderShop(){let all=[...S.items.filter(i=>i.status!=='bought'),...S.items.filter(i=>i.status==='bought')];$('shopSummary').textContent=`${S.items.filter(i=>i.status!=='bought').length} remaining · ${S.items.filter(i=>i.status==='bought').length} bought`;$('list').innerHTML=all.map(i=>{let ix=S.items.indexOf(i);return`<div class="item ${i.status==='bought'?'done':''}"><div class="row" onclick="S.items[${ix}].status=S.items[${ix}].status==='bought'?'needed':'bought';save();renderShop()"><div class="check">${i.status==='bought'?'✓':''}</div><div><b>${qt(i)} ${cap(i.name)}</b><div class="muted">${i.section||sec(i.name)} · ${i.source||''}</div></div></div><button class="btn small alt" onclick="editShop(${ix})">Edit</button></div>`}).join('')||'<p class="muted">No list yet.</p>'}function editShop(i){shopIx=i;let x=S.items[i];$('ingTitle').textContent='Edit shopping item';$('inName').value=x.name||'';$('inQty').value=x.qty||'';$('inUnit').value=x.unit||'';$('inType').value=x.type||'required';$('ing').classList.add('on')}function addManual(){let v=$('manual').value.trim();if(v){S.items.push({name:v,qty:'',unit:'',section:sec(v),source:'Manual',status:'needed'});$('manual').value='';save();renderShop()}}load();
</script>
</body></html>
