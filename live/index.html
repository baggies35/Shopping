<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <title>Our Shop</title>
  <style>
    body{font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial;margin:0;background:#f7f3ec;color:#1e1b16;display:grid;place-items:center;min-height:100vh;padding:18px;text-align:center}
    .card{background:#fffaf2;border:1px solid #e4d8c8;border-radius:22px;padding:18px;max-width:420px;box-shadow:0 8px 22px #0001}
  </style>
</head>
<body>
  <div class="card">
    <h1>Opening Our Shop…</h1>
    <p>Loading the latest app.</p>
  </div>
  <script>
    (async function(){
      const source = 'https://raw.githubusercontent.com/baggies35/Shopping/bdb54cd8c7227501e0d98578ad4dc7f968413ed0/live-next/index.html';
      try {
        let html = await fetch(source, { cache: 'no-store' }).then(r => r.text());
        html = html
          .replace('<title>Shopping Next</title>', '<title>Our Shop</title>')
          .replace('Test version · live-next', 'Shared shopping app')
          .replace('Current live app stays untouched. These are test links.', 'Copy links for you and Rach.')
          .replace('Copy Jason test link', 'Copy Jason link')
          .replace('Copy Rach test link', 'Copy Rach link')
          .replace("const STORE='shopping-live';const BUILD='live-next-1';", "const STORE='shopping-live';const BUILD='live';")
          .replace("location.origin+location.pathname.replace(/\\/index.html$/,'')+'#'+name.toLowerCase()", "location.origin+location.pathname.replace('/live-next/','/live/').replace(/\\/index.html$/,'')+'#'+name.toLowerCase()");

        const livePatch = `
          <script src="config.js"><\/script>
          <script src="sync.js"><\/script>
          <script>
            (function(){
              function clean(v){ return String(v || '').trim(); }
              function lower(v){ return String(v || '').toLowerCase().replace(/[^a-z0-9]/g, ''); }

              function findMealForIngredientAdd() {
                const candidates = [];
                if (typeof mealName !== 'undefined' && mealName) candidates.push(mealName);
                const title = document.getElementById('mealTitle')?.textContent;
                if (title) candidates.push(title);
                const inputName = document.getElementById('mealN')?.value;
                if (inputName) candidates.push(inputName);
                for (const n of candidates) {
                  const found = (typeof meal === 'function') ? meal(n) : null;
                  if (found) return { meal: found, name: found.name || n };
                }
                if (Array.isArray(S?.meals) && candidates.length) {
                  const wanted = lower(candidates[0]);
                  const found = S.meals.find(m => lower(m.name) === wanted);
                  if (found) return { meal: found, name: found.name };
                }
                return { meal: null, name: candidates[0] || '' };
              }

              function tidyStatusText() {
                document.querySelectorAll('#days .pill, #planDays .muted').forEach(el => {
                  const t = (el.textContent || '').trim().toLowerCase();
                  if (t === 'rejected') el.textContent = 'Rejected';
                  if (t === 'agreed') el.textContent = 'Agreed';
                  if (t === 'suggested') el.textContent = 'Suggested';
                });
              }

              function makeHomeMealsOpenPlan() {
                document.querySelectorAll('#days .day').forEach(el => {
                  el.onclick = function(){ go('plan'); };
                });
              }

              function applyLivePatch() {
                makeHomeMealsOpenPlan();
                tidyStatusText();
              }

              window.savePickedIngredient = function savePickedIngredientFixed() {
                try {
                  const name = clean(document.getElementById('pickName')?.value);
                  if (!name) { alert('Add an ingredient name first.'); return; }

                  const qty = clean(document.getElementById('pickQty')?.value);
                  const unit = document.getElementById('pickUnit')?.value || '';
                  const type = document.getElementById('pickType')?.value || 'required';
                  const section = document.getElementById('pickSection')?.value || (typeof sec === 'function' ? sec(name) : 'Cupboard');
                  const ingredient = { name, qty, unit, type, section };

                  const foundMeal = findMealForIngredientAdd();
                  const currentMeal = foundMeal.meal;
                  if (!currentMeal) {
                    alert('Could not find the meal to add this to. Tap Edit on the meal again, then add the ingredient.');
                    return;
                  }

                  currentMeal.ingredients = Array.isArray(currentMeal.ingredients) ? currentMeal.ingredients : [];
                  const alreadyThere = currentMeal.ingredients.some(x => lower(x.name) === lower(name));
                  if (alreadyThere && !confirm(name + ' is already on this meal. Add it again anyway?')) return;

                  currentMeal.ingredients.push(ingredient);

                  if (Array.isArray(S.masterIngredients)) {
                    const existing = S.masterIngredients.find(x => lower(x.name) === lower(name));
                    if (existing) {
                      existing.qty = existing.qty || qty;
                      existing.unit = unit || existing.unit || '';
                      existing.type = type || existing.type || 'required';
                      existing.section = section || existing.section || 'Cupboard';
                    } else {
                      S.masterIngredients.push({ ...ingredient });
                    }
                  } else {
                    S.masterIngredients = [{ ...ingredient }];
                  }

                  S.finalItems = [];
                  if (typeof closeM === 'function') closeM('ingredientPicker');
                  else document.getElementById('ingredientPicker')?.classList.remove('on');

                  if (typeof save === 'function') save();
                  if (typeof render === 'function') render();
                  if (typeof editMeal === 'function') editMeal(foundMeal.name || currentMeal.name);
                } catch (e) {
                  console.error(e);
                  alert('Could not add ingredient. I have logged the error in the browser console.');
                }
              };

              const originalRender = window.render;
              if (typeof originalRender === 'function') {
                window.render = function patchedRender() {
                  originalRender();
                  setTimeout(applyLivePatch, 0);
                };
              }

              const originalRespond = window.respond;
              if (typeof originalRespond === 'function') {
                window.respond = function patchedRespond(i, s) {
                  originalRespond(i, String(s || '').toLowerCase());
                  setTimeout(applyLivePatch, 0);
                };
              }

              setTimeout(function(){ if (typeof render === 'function') render(); applyLivePatch(); }, 250);

              setInterval(function(){
                if (document.hidden) return;
                if (typeof window.refreshSharedList === 'function') window.refreshSharedList();
              }, 15000);

              document.addEventListener('visibilitychange', function(){
                if (!document.hidden && typeof window.refreshSharedList === 'function') window.refreshSharedList();
              });
            })();
          <\/script>`;

        html = html.replace('</body>', livePatch + '</body>');
        document.open();
        document.write(html);
        document.close();
      } catch (e) {
        document.body.innerHTML = '<div class="card"><h1>Could not load app</h1><p>Please refresh.</p></div>';
      }
    })();
  </script>
</body>
</html>
