<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate, max-age=0">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>Our Shop</title>
  <style>
    body{font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial;margin:0;background:#f7f3ec;color:#1e1b16;display:grid;place-items:center;min-height:100vh;padding:18px;text-align:center}
    .card{background:#fffaf2;border:1px solid #e4d8c8;border-radius:22px;padding:18px;max-width:420px;box-shadow:0 8px 22px #0001}
  </style>
</head>
<body>
  <div class="card">
    <h1>Opening Our Shop…</h1>
    <p>Loading the latest app.</p>
  </div>
  <script>
    (async function(){
      const BUILD = String(Date.now());
      const errorReporter = `
        <script>
          (function(){
            function showError(context, error, extra){
              const msg = error && error.message ? error.message : String(error || 'Unknown error');
              const stack = error && error.stack ? error.stack : '';
              const text = ['Context: '+context, 'Message: '+msg, extra ? 'Extra: '+extra : '', stack ? 'Stack: '+stack : ''].filter(Boolean).join('\\n\\n');
              let box = document.getElementById('visibleErrorBox');
              if (!box) {
                box = document.createElement('div');
                box.id = 'visibleErrorBox';
                box.style.cssText = 'position:fixed;left:10px;right:10px;bottom:10px;z-index:999999;background:#fff1f1;border:2px solid #b84b4b;border-radius:16px;padding:12px;color:#1e1b16;font-family:system-ui;max-height:45vh;overflow:auto;text-align:left;box-shadow:0 8px 28px #0004';
                document.body.appendChild(box);
              }
              box.innerHTML = '<div style="display:flex;justify-content:space-between;gap:10px;align-items:center"><b>App error</b><button onclick="document.getElementById(\\'visibleErrorBox\\').remove()" style="border:0;border-radius:10px;padding:7px 10px;font-weight:900">Close</button></div><pre style="white-space:pre-wrap;font-size:12px;line-height:1.25;margin:10px 0 0">'+text.replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]))+'</pre>';
            }
            window.addEventListener('error', function(ev){ showError('window.error', ev.error || ev.message, (ev.filename||'')+':'+(ev.lineno||'')+':'+(ev.colno||'')); });
            window.addEventListener('unhandledrejection', function(ev){ showError('unhandled promise rejection', ev.reason); });
          })();
        <\/script>`;

      try {
        if ('serviceWorker' in navigator) {
          const regs = await navigator.serviceWorker.getRegistrations();
          await Promise.all(regs.map(r => r.unregister()));
        }
        if (window.caches && caches.keys) {
          const keys = await caches.keys();
          await Promise.all(keys.map(k => caches.delete(k)));
        }
      } catch(e) { console.warn('Cache clear skipped', e); }

      const source = 'https://raw.githubusercontent.com/baggies35/Shopping/bdb54cd8c7227501e0d98578ad4dc7f968413ed0/live-next/index.html?b=' + BUILD;
      try {
        let html = await fetch(source, { cache: 'no-store' }).then(r => r.text());
        const liveBuild = 'live-' + BUILD;
        html = html
          .replace('<title>Shopping Next</title>', '<title>Our Shop</title>')
          .replace('Test version · live-next', 'Shared shopping app')
          .replace('Current live app stays untouched. These are test links.', 'Copy links for you and Rach.')
          .replace('Copy Jason test link', 'Copy Jason link')
          .replace('Copy Rach test link', 'Copy Rach link')
          .replace("const STORE='shopping-live';const BUILD='live-next-1';let S,pi=0,dayIx=0,mealName='',editIx=null,shopIx=null,weeklyIx=null,masterKey=null,finalIx=null,editMode='',setupMode='meals',shopMode='need';", "const STORE='shopping-live';const BUILD='" + liveBuild + "';var S,pi=0,dayIx=0,mealName='',editIx=null,shopIx=null,weeklyIx=null,masterKey=null,finalIx=null,editMode='',setupMode='meals',shopMode='need';")
          .replace("location.origin+location.pathname.replace(/\\/index.html$/,'')+'#'+name.toLowerCase()", "location.origin+location.pathname.replace('/live-next/','/live/').replace(/\\/index.html$/,'')+'#'+name.toLowerCase()")
          .replace('load();', 'load();window.S=S;');

        const livePatch = `
          <script src="config.js?b=${BUILD}"><\/script>
          <script src="quantity-fix.js?b=${BUILD}"><\/script>
          <script src="sync.js?b=${BUILD}"><\/script>`;

        html = html.replace('</body>', errorReporter + livePatch + '</body>');
        document.open();
        document.write(html);
        document.close();
      } catch (e) {
        document.body.innerHTML = '<div class="card"><h1>Could not load app</h1><p>Please refresh.</p><pre style="white-space:pre-wrap;text-align:left">'+String(e && e.stack || e)+'</pre></div>';
      }
    })();
  </script>
</body>
</html>
