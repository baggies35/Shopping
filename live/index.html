<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Our Shop</title>
  <meta http-equiv="refresh" content="0; url=../live-next/">
  <style>
    body{font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial;margin:0;background:#f7f3ec;color:#1e1b16;display:grid;place-items:center;min-height:100vh;padding:18px;text-align:center}
    .card{background:#fffaf2;border:1px solid #e4d8c8;border-radius:22px;padding:18px;max-width:420px;box-shadow:0 8px 22px #0001}
    a{color:#2f6f5e;font-weight:900}
  </style>
</head>
<body>
  <div class="card">
    <h1>Opening Our Shop…</h1>
    <p>If it does not open automatically, tap below.</p>
    <p><a id="openLink" href="../live-next/">Open shopping app</a></p>
  </div>
  <script>
    const target = '../live-next/' + (location.search || '') + (location.hash || '');
    document.getElementById('openLink').href = target;
    location.replace(target);
  </script>
</body>
</html>
